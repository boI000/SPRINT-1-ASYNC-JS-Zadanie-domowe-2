<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rick and Morty 1</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="controls" class="controls">
      <div class="inputField">
        <label>Filtry:</label>
        <input
          type="text"
          id="searchInput"
          placeholder="Wyszukaj po nazwie..."
        />
      </div>
      <div class="radio">
        <label><input type="radio" name="status" value="Alive" />Żywy</label>
        <label><input type="radio" name="status" value="Dead" />Martwy</label>
        <label
          ><input type="radio" name="status" value="unknown" />Nieznany</label
        >
      </div>
    </div>
    <div id="charactersGrid" class="charactersGrid"></div>
    <div class="pagination">
      <button id="prevBtn" class="pageBtn">
        <img src="assets/icons/arrow_left.png" />
      </button>
      <button id="nextBtn" class="pageBtn">
        <img src="assets/icons/arrow_right.png" />
      </button>
    </div>
    <div class="formContainer">
      <form id="addCharacterForm" class="addCharacterForm">
        <h1>Stwórz postać</h1>
        <input type="text" id="name" placeholder="Nazwa postaci" />
        <select id="status">
          <option value="Alive">Żywy</option>
          <option value="Dead">Martwy</option>
          <option value="unknown">Nieznany</option>
        </select>
        <input type="text" id="species" placeholder="Gatunek" />
        <button type="submit" class="addBtn">Dodaj postać</button>
      </form>
    </div>
    <script src="app.js"></script>
  </body>
</html>
